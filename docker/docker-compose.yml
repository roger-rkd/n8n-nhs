version: "3.9"

services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always
    networks:
      - app_net

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - N8N_BASE_URL=http://n8n:5678
      - SESSION_TTL_MINUTES=30
      - GROQ_API_KEY=${GROQ_API_KEY}
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    depends_on:
      - n8n
    restart: always
    networks:
      - app_net

volumes:
  n8n_data:

networks:
  app_net:
